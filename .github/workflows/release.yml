name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - loader.js

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate new version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate loader.js
        run: |
          V="${{ steps.version.outputs.version }}"
          BASE="https://cdn.jsdelivr.net/gh/karenrebecag/AtomWebflow_2026Site"
          printf '(function(){var v="%s";var base="%s";var l=document.createElement("link");l.rel="stylesheet";l.href=base+"@"+v+"/src/css/site.css";document.head.appendChild(l);var s=document.createElement("script");s.type="module";s.setAttribute("data-cfasync","false");s.src=base+"@"+v+"/src/js/site.js";document.head.appendChild(s);})();\n' \
            "$V" "$BASE" > loader.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add loader.js
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Purge jsDelivr loader cache
        # Webflow Head referencia @latest/loader.js (resuelve al tag mas alto).
        # jsDelivr cachea la resolucion de refs mutables (@main 12h via s-maxage) y
        # purgar el archivo NO siempre re-resuelve el ref — por eso @main quedaba
        # atascado en una version vieja. @latest (sobre tags) se refresca mejor; aun
        # asi verificamos con reintentos hasta confirmar que sirve la version nueva.
        run: |
          V="${{ steps.version.outputs.version }}"
          REPO="karenrebecag/AtomWebflow_2026Site"
          purge() { curl -s "https://purge.jsdelivr.net/gh/${REPO}@$1/loader.js" > /dev/null || true; }

          # @latest = ref que usa Webflow; @main por compatibilidad
          purge latest
          purge main

          ok=0
          for i in $(seq 1 8); do
            sleep 8
            BODY="$(curl -s "https://cdn.jsdelivr.net/gh/${REPO}@latest/loader.js")"
            if printf '%s' "$BODY" | grep -q "\"$V\""; then
              echo "@latest/loader.js sirve v$V (intento $i)"; ok=1; break
            fi
            echo "intento $i: @latest aun no sirve v$V; re-purga"
            purge latest
          done
          if [ "$ok" != "1" ]; then
            echo "::warning::@latest/loader.js no refresco a v$V tras reintentos; jsDelivr puede tardar hasta su TTL. El tag @v$V ya esta fresco e inmutable."
          fi
